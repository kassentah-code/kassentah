<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KASSENTAH</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body { width: 100%; min-height: 100svh; }

body {
  background: #fff;
  color: #0d0d0d;
  font-family: Helvetica, Arial, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100svh;
  padding: clamp(2.5rem, 8vw, 5rem) clamp(1.5rem, 6vw, 3rem);
  gap: clamp(2rem, 5vw, 3rem);
}

.logo img {
  width: min(72vw, 340px);
  height: auto;
  display: block;
}

.main-text {
  text-align: center;
  line-height: 1.85;
}

.main-text p {
  font-size: clamp(0.88rem, 2.8vw, 1.05rem);
  color: #0d0d0d;
}

.main-text a {
  color: inherit;
  text-decoration: underline;
  text-underline-offset: 3px;
}

/* PROJECTS + MEMBERS: side by side on wide, stacked on mobile */
.meta {
  display: flex;
  gap: clamp(2.5rem, 8vw, 6rem);
  justify-content: center;
  flex-wrap: wrap;
  text-align: center;
}

.meta-block {}

.meta-title {
  font-size: clamp(0.55rem, 1.6vw, 0.62rem);
  font-weight: 400;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #bbb;
  margin-bottom: 0.55rem;
}

.meta-list {
  font-size: clamp(0.6rem, 1.8vw, 0.68rem);
  color: #999;
  line-height: 2;
}

.copy {
  position: fixed;
  bottom: clamp(1rem, 3vw, 1.6rem);
  right: clamp(1rem, 3vw, 1.6rem);
  font-size: clamp(0.52rem, 1.4vw, 0.6rem);
  color: #ccc;
  letter-spacing: 0.06em;
}
</style>
</head>
<body>

  <div class="logo">
    <img src="../kassentah.png" alt="KASSENTAH">
  </div>

  <div class="main-text">
    <p>The web is currently underconstruct.</p>
    <p>Please contact <a href="mailto:kassentah.com@gmail.com">kassentah.com@gmail.com</a></p>
  </div>

  <div class="meta">

    <div class="meta-block">
      <div class="meta-title">Projects</div>
      <div class="meta-list">
        From Sharp to Rounded<br>
        Sculptural Basement<br>
        Relay Drawing BBUL
      </div>
    </div>

    <div class="meta-block">
      <div class="meta-title">History of Members</div>
      <div class="meta-list">
        Junyeol Baek<br>
        Hyejin Noh<br>
        Philjae Kim<br>
        Gagyeong Lee<br>
        Taegyun Ham<br>
        Yunyeong Jeong
      </div>
    </div>

  </div>

  <div class="copy">© 2025</div>

</body>
</html>
